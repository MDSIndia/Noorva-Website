<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; }
  .sheet {
    width: 1200px;
    height: 1780px;
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  /* ---------- COVER FRONT / BACK shared leather ground ---------- */
  .leather {
    background: radial-gradient(150% 120% at 50% -10%, #2c1c14 0%, #1a1108 42%, #090604 100%);
  }
  .leather-vignette {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 320px rgba(0,0,0,0.7), inset 0 0 100px rgba(0,0,0,0.55);
  }
  .gilt-frame-outer {
    position: absolute; inset: 34px; border-radius: 16px;
    border: 1.5px solid rgba(244,209,158,0.85);
    box-shadow: 0 0 16px rgba(232,180,120,0.55), inset 0 0 14px rgba(232,180,120,0.3);
  }
  .gilt-frame-inner {
    position: absolute; inset: 46px; border-radius: 8px;
    border: 1px solid rgba(232,180,120,0.45);
    box-shadow: 0 0 11px rgba(232,180,120,0.35), inset 0 0 10px rgba(232,180,120,0.18);
  }
  .flourish {
    position: absolute; width: 26px; height: 26px; transform: rotate(45deg);
    border: 1.25px solid rgba(244,209,158,0.8);
    box-shadow: 0 0 10px rgba(232,180,120,0.6);
  }

  /* ---------- COVER FRONT content ---------- */
  .medallion-ring1 {
    position: absolute; border-radius: 50%;
    border: 2px solid rgba(232,180,120,0.5);
    box-shadow: 0 0 52px rgba(232,180,120,0.25);
  }
  .medallion-ring2 { position: absolute; border-radius: 50%; border: 2px solid rgba(232,180,120,0.25); }
  .medallion-core {
    position: absolute; border-radius: 50%; background: #0c0805;
    box-shadow: inset 0 0 0 2px rgba(232,180,120,0.45), 0 0 44px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
  }
  /* Font sizes/tracking here are tuned for legibility at the size this
     texture actually renders on screen, not the size it's baked at — the
     idle preview book is only ~270px wide on the real page, a ~4.5x
     downscale from this 1200px-wide canvas, so anything under ~24px or
     with wide letter-spacing (which thins out strokes further) mipmaps
     into an illegible smudge. The tagline/CTA lines that used to live here
     were dropped rather than enlarged to fit — both are already shown as
     crisp real DOM text right around the book on the page itself
     (StoryGallerySection.tsx), so repeating them here in baked, harder-to-
     read form was pure redundancy. */
  .cover-eyebrow {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 26px; font-weight: 400; letter-spacing: 7px; text-transform: uppercase;
    color: rgba(232,180,120,0.75);
  }
  .cover-title {
    position: absolute; left: 0; right: 0; text-align: center;
    font-family: Georgia, 'Times New Roman', serif; font-size: 148px; line-height: 1;
    background: linear-gradient(180deg, #fff7e6 0%, #f6e3ba 30%, #e8b478 65%, #a97a3f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .cover-rule {
    position: absolute; left: 50%; transform: translateX(-50%); height: 1px; width: 190px;
    background: linear-gradient(90deg, transparent, rgba(244,209,158,0.9), transparent);
    box-shadow: 0 0 9px 0.5px rgba(232,180,120,0.65);
  }
  .cover-count {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 30px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* ---------- SPINE ---------- */
  .spine-sheet { width: 340px; height: 1780px; background: linear-gradient(180deg, #241609 0%, #150d06 100%); }
  .spine-band {
    position: absolute; left: 12px; right: 12px; height: 34px; border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,224,168,0.35) 0%, rgba(232,180,120,0.15) 30%, rgba(0,0,0,0.35) 75%, rgba(0,0,0,0.55) 100%);
    box-shadow: 0 2px 0 rgba(255,238,210,0.4) inset, 0 -6px 10px rgba(0,0,0,0.6) inset, 0 6px 12px rgba(0,0,0,0.5);
  }

  /* ---------- CHAPTER PAGE ----------
     Full-bleed photo filling the entire sheet, not a small boxed thumbnail
     beside a text column — the copy sits directly on top of the image via a
     bottom scrim, like a photo-essay/magazine spread. */
  .page-sheet { background: #0c0805; }
  .page-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 65%; }
  .page-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(10,7,4,0.05) 0%, rgba(10,7,4,0.08) 34%, rgba(10,7,4,0.5) 58%,
      rgba(10,7,4,0.86) 78%, rgba(8,5,3,0.96) 100%);
  }
  .page-vignette { position: absolute; inset: 0; box-shadow: inset 0 0 170px rgba(0,0,0,0.4); }
  .page-border-outer { position: absolute; inset: 26px; border-radius: 14px; border: 2px solid rgba(232,180,120,0.4); }
  .page-border-inner { position: absolute; inset: 40px; border-radius: 8px; border: 1px solid rgba(232,180,120,0.18); }
  .page-content { position: absolute; left: 64px; right: 64px; bottom: 130px; }
  .page-eyebrow { font-size: 18px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; color: rgba(232,180,120,0.88); text-shadow: 0 2px 14px rgba(0,0,0,0.55); }
  .page-headline { font-family: Georgia, 'Times New Roman', serif; font-size: 50px; line-height: 1.22; font-weight: 400; color: #fdf6e8; margin-top: 24px; text-shadow: 0 4px 22px rgba(0,0,0,0.65); }
  .page-body { font-size: 21px; line-height: 1.65; font-weight: 300; color: rgba(255,255,255,0.84); margin-top: 24px; max-width: 900px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  .page-footer { position: absolute; left: 64px; right: 64px; bottom: 48px; display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
  .page-footer span { font-size: 15px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.6); text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

  /* ---------- COVER EMISSIVE MASK ----------
     Baked separately from the leather cover art above: pure black
     everywhere except the gilt frame/flourish/rule linework, which is
     drawn near-white-gold with a heavy blur halo. Used as a three.js
     emissiveMap in BookModel.tsx so those lines self-illuminate a true
     gold regardless of scene lighting/viewing angle — the visible cover
     texture alone can't do this, since under this file's ordinary
     directional/environment lighting a merely-bright *diffuse* gold line
     still reads as washed-out gray from off-angle views where specular
     response doesn't favor it. Black stays black in an emissiveMap (no
     light added), so nothing else on the cover is affected. */
  .emissive-sheet { background: #000; }
  .glow-line { border-color: #ffd9a0; }
</style>
</head>
<body>

  <!-- ============ COVER FRONT ============ -->
  <div class="sheet leather" id="cover-front">
    <div class="leather-vignette"></div>
    <div class="gilt-frame-outer"></div>
    <div class="gilt-frame-inner"></div>
    <div class="flourish" style="top:70px;left:70px;"></div>
    <div class="flourish" style="top:70px;right:90px;"></div>
    <div class="flourish" style="bottom:70px;left:70px;"></div>
    <div class="flourish" style="bottom:70px;right:90px;"></div>

    <div class="medallion-ring1" style="top:560px;left:50%;transform:translateX(-50%);width:200px;height:200px;"></div>
    <div class="medallion-ring2" style="top:574px;left:50%;transform:translateX(-50%);width:172px;height:172px;"></div>
    <div class="medallion-core" style="top:602px;left:50%;transform:translateX(-50%);width:116px;height:116px;">
      <div style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#c084fc,#7c5cfc);"></div>
    </div>

    <div class="cover-eyebrow" style="top:820px;">The Noorva Story</div>
    <div class="cover-title" style="top:880px;">Noorva</div>
    <div class="cover-rule" style="top:1070px;"></div>
    <div class="cover-count" style="top:1110px;">10 Chapters</div>
  </div>

  <!-- ============ COVER BACK ============ -->
  <div class="sheet leather" id="cover-back">
    <div class="leather-vignette"></div>
    <div class="gilt-frame-outer"></div>
    <div class="gilt-frame-inner"></div>
    <div class="flourish" style="top:70px;left:70px;"></div>
    <div class="flourish" style="top:70px;right:90px;"></div>
    <div class="flourish" style="bottom:70px;left:70px;"></div>
    <div class="flourish" style="bottom:70px;right:90px;"></div>

    <div class="medallion-ring1" style="top:50%;left:50%;transform:translate(-50%,-50%);width:230px;height:230px;"></div>
    <div class="medallion-ring2" style="top:50%;left:50%;transform:translate(-50%,-50%);width:198px;height:198px;"></div>
    <div class="medallion-core" style="top:50%;left:50%;transform:translate(-50%,-50%);width:132px;height:132px;">
      <div style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#c084fc,#7c5cfc);"></div>
    </div>

    <div class="cover-rule" style="top:calc(50% + 158px);"></div>
    <div class="cover-eyebrow" style="top:calc(50% + 184px);">MDS India</div>
  </div>

  <!-- ============ COVER FRONT EMISSIVE (glow mask) ============ -->
  <div class="sheet emissive-sheet" id="cover-front-emissive">
    <div class="gilt-frame-outer glow-line" style="box-shadow: 0 0 30px 6px rgba(255,196,110,1), inset 0 0 24px rgba(255,196,110,0.75);"></div>
    <div class="gilt-frame-inner glow-line" style="box-shadow: 0 0 20px 3px rgba(255,196,110,0.9), inset 0 0 12px rgba(255,196,110,0.5);"></div>
    <div class="flourish glow-line" style="top:70px;left:70px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="top:70px;right:90px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="bottom:70px;left:70px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="bottom:70px;right:90px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="cover-rule" style="top:1070px; background: linear-gradient(90deg, transparent, #ffe6bc, transparent); box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
  </div>

  <!-- ============ COVER BACK EMISSIVE (glow mask) ============ -->
  <div class="sheet emissive-sheet" id="cover-back-emissive">
    <div class="gilt-frame-outer glow-line" style="box-shadow: 0 0 30px 6px rgba(255,196,110,1), inset 0 0 24px rgba(255,196,110,0.75);"></div>
    <div class="gilt-frame-inner glow-line" style="box-shadow: 0 0 20px 3px rgba(255,196,110,0.9), inset 0 0 12px rgba(255,196,110,0.5);"></div>
    <div class="flourish glow-line" style="top:70px;left:70px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="top:70px;right:90px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="bottom:70px;left:70px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="flourish glow-line" style="bottom:70px;right:90px; box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
    <div class="cover-rule" style="top:calc(50% + 158px); background: linear-gradient(90deg, transparent, #ffe6bc, transparent); box-shadow: 0 0 18px 3px rgba(255,196,110,1);"></div>
  </div>

  <!-- ============ SPINE ============ -->
  <div class="sheet spine-sheet" id="spine">
    <div class="spine-band" style="top:14%;"></div>
    <div class="spine-band" style="top:32%;"></div>
    <div class="spine-band" style="top:50%;"></div>
    <div class="spine-band" style="top:68%;"></div>
    <div class="spine-band" style="top:86%;"></div>
  </div>

  <!-- ============ CHAPTER PAGES ============ -->
  <div class="sheet page-sheet" id="page-1">
    <img class="page-photo" src="PLACEHOLDER" />
    <div class="page-scrim"></div>
    <div class="page-vignette"></div>
    <div class="page-border-outer"></div>
    <div class="page-border-inner"></div>
    <div class="page-content">
      <div class="page-eyebrow">01 / The Spark</div>
      <div class="page-headline">Before language, before fire had a name — there was only the looking up.</div>
      <div class="page-body">A mind curious enough to wonder about the lights above it was already, quietly, becoming something new.</div>
    </div>
    <div class="page-footer"><span>The Noorva Story</span><span>01 / 08</span></div>
  </div>

</body>
</html>
